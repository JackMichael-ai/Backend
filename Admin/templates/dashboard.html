{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Grid Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/main.css'%}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Card Dashboard</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>

<!-- Main content -->
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Items Overview</h2>
        <a href="{% url 'add_item' %}" class="btn btn-primary">+ Add New Item</a>
    </div>

    <div class="row">
        <!-- Example Card -->
        {% for item in items %}

<div class="col-md-4">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            {% if item.image %}
        <img src="{{ item.image.url }}" class="card-img-top" alt="{{ item.title }}" class="card-img-top" style="height: 200px;" object-fit="cover">
    {% else %}
        <img src="https://via.placeholder.com/150" class="card-img-top" alt="No image available">
    {% endif %}
            <h5 class="card-title">{{ item.title }}</h5>
            <h6 class="text-success">Price: KSh {{ item.price }}</h6>
            <p class="card-text text-muted">{{ item.description }}</p>
            <div class="card-actions">
                <a href="{% url 'Update_item' item.id %}" class="btn btn-primary">Edit</a>
                <a href="#" class="btn btn-sm btn-outline-danger">Delete</a>
            </div>
        </div>
    </div>
</div>
{% endfor %}

        <!-- Repeat this card dynamically -->

        <!-- Add more cards as needed -->
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
