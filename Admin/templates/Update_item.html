{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css'%}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'dashboard' %}">Card Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-3">Update Item</h4>
                </div>

                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Title
                            <input type="text" name="title" class="form-control" value="{{item.title}}">
                                </label>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description
                            <textarea name="description" class="form-control" rows="4" >"{{ item.description }}"</textarea>
                                </label>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category
                            <input type="text" name="category" class="form-control" value="{{item.category}}">
                                </label>
                        </div>
                          <div class="mb-3">
                            <label class="form-label">Price
                            <input type="number" name="price" class="form-control" value="{{item.price}}">
                                </label>
                        </div>
                        </div>
                          <div class="mb-3">
                            <label class="form-label">Date
                            <input type="datetime-local" name="date" class="form-control" value="{{item.date}}">
                                </label>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success">Update Item</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
